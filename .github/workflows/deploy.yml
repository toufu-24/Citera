name: Deploy Citera

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: citera-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Validate production configuration
        run: pnpm deploy:check

      - name: Build web and Workers
        run: pnpm build

      - name: Deploy API Worker and web assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.110.0
          command: deploy --env production --config wrangler.jsonc

      - name: Deploy Jobs Worker
        run: pnpm --filter @citera/jobs deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
